<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon FPS HTML5 - Multi P2P</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        /* Écran de connexion / Menu principal */
        #menu-container {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #111 0%, #222 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .menu-box {
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 12px;
            border: 2px solid #ff4b4b;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 75, 75, 0.3);
            max-width: 400px;
            width: 90%;
        }

        .menu-box h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #ff4b4b;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 0.9em;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            font-size: 1em;
            box-sizing: border-box;
        }

        .input-group input:focus {
            border-color: #ff4b4b;
            outline: none;
        }

        .menu-btn {
            width: 100%;
            padding: 12px;
            background: #ff4b4b;
            border: none;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .menu-btn:hover {
            background: #ff2a2a;
        }

        .p2p-info {
            margin-top: 15px;
            font-size: 0.85em;
            color: #888;
            border-top: 1px solid #333;
            padding-top: 15px;
        }

        /* Viseur au centre */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
            display: none;
        }

        /* Interface en jeu (HUD) */
        #hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 250px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #333;
            z-index: 5;
            display: none;
        }

        #player-profile {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 5px;
            border-left: 4px solid #ff4b4b;
            color: white;
            font-weight: bold;
            z-index: 5;
            display: none;
        }

        .bar-container {
            width: 100%;
            background-color: #444;
            height: 20px;
            border-radius: 5px;
            overflow: hidden;
        }

        #health-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff4b4b, #ff2a2a);
            transition: width 0.3s ease;
        }

        #health-text {
            color: white;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }

        /* Instructions d'activation de la souris */
        #game-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            z-index: 10;
            display: none;
        }
    </style>
    <!-- Bibliothèques distantes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>

    <!-- ÉCRAN DE MENU DE DÉPART -->
    <div id="menu-container">
        <div class="menu-box">
            <h1>STRIKE P2P</h1>
            
            <div class="input-group">
                <label for="username-input">Choisis ton Pseudo :</label>
                <input type="text" id="username-input" placeholder="Soldat_Anonyme" maxlength="15">
            </div>

            <button class="menu-btn" id="btn-solo">Jouer en Solo</button>

            <div class="p2p-info">
                <p>— SECTION MULTIJOUEUR P2P —</p>
                <div class="input-group">
                    <label for="peer-id-input">Rejoindre un ami (Entrer son ID) :</label>
                    <input type="text" id="peer-id-input" placeholder="ID de ton pote...">
                </div>
                <button class="menu-btn" id="btn-Connect" style="background: #3498db;">Se connecter à l'ami</button>
                <p id="my-id-display" style="margin-top: 15px; font-size: 0.9em; color: #2ecc71; font-weight: bold;"></p>
            </div>
        </div>
    </div>

    <!-- REPRISE DE SOURIS EN JEU -->
    <div id="game-overlay">
        <h2 style="font-size: 2em; margin-bottom: 10px;">Pause / Mode Fenêtré</h2>
        <p>Clique sur l'écran pour reprendre le contrôle</p>
    </div>

    <!-- VISEUR -->
    <div id="crosshair"></div>

    <!-- HUD DU JOUEUR -->
    <div id="player-profile">
        Joueur : <span id="display-username">...</span>
    </div>

    <div id="hud">
        <div id="health-text">VIE: <span id="health-val">100</span>%</div>
        <div class="bar-container">
            <div id="health-bar"></div>
        </div>
    </div>

    <script>
        // --- CONSTANTES & VARIABLES GLOBALES ---
        let playerPseudo = "Soldat";
        let isGameActive = false;
        let peer = null;
        let p2pConnection = null;
        let myPeerId = "";

        // --- ENREGISTREMENT ET INITIALISATION DU RÉSEAU P2P ---
        // On initialise PeerJS immédiatement en arrière-plan pour obtenir notre ID P2P
        peer = new Peer();

        peer.on('open', (id) => {
            myPeerId = id;
            document.getElementById('my-id-display').innerText = "Ton ID de partage : " + id;
            console.log("Mon ID PeerJS est : " + id);
        });

        peer.on('connection', (conn) => {
            p2pConnection = conn;
            setupConnectionEvents();
            alert("Un joueur s'est connecté à toi ! Préparation du terrain...");
            startGame();
        });

        // --- CONFIGURATION DU MENU ---
        const btnSolo = document.getElementById('btn-solo');
        const btnConnect = document.getElementById('btn-Connect');
        const usernameInput = document.getElementById('username-input');
        const peerIdInput = document.getElementById('peer-id-input');
        const menuContainer = document.getElementById('menu-container');
        const gameOverlay = document.getElementById('game-overlay');

        btnSolo.addEventListener('click', () => {
            validerPseudo();
            startGame();
        });

        btnConnect.addEventListener('click', () => {
            validerPseudo();
            const targetId = peerIdInput.value.trim();
            if (targetId === "") {
                alert("Veuillez entrer l'ID de votre ami pour vous connecter.");
                return;
            }
            // Connexion au pair distant
            p2pConnection = peer.connect(targetId);
            setupConnectionEvents();
            startGame();
        });

        function validerPseudo() {
            if (usernameInput.value.trim() !== "") {
                playerPseudo = usernameInput.value.trim();
            }
            document.getElementById('display-username').innerText = playerPseudo;
        }

        function setupConnectionEvents() {
            p2pConnection.on('open', () => {
                console.log("Connecté avec succès au pair !");
                // On envoie notre pseudo à l'autre joueur
                p2pConnection.send({ type: 'init', pseudo: playerPseudo });
            });

            p2pConnection.on('data', (data) => {
                // Cette zone servira plus tard à recevoir les positions et tirs de l'autre joueur
                console.log("Données reçues du joueur distant :", data);
            });
        }

        function startGame() {
            menuContainer.style.opacity = '0';
            setTimeout(() => {
                menuContainer.style.display = 'none';
                document.getElementById('crosshair').style.display = 'block';
                document.getElementById('hud').style.display = 'block';
                document.getElementById('player-profile').style.display = 'block';
                isGameActive = true;
                document.body.requestPointerLock();
            }, 500);
        }

        // --- CONFIGURATION DE BASE THREE.JS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.05);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- LUMIÈRES ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        scene.add(directionalLight);

        // --- LE SOL ---
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- CRÉATION DU BRAS ET DE L'ARME AUTOUR DE LA CAMÉRA ---
        const playerWeaponGroup = new THREE.Group();

        const armGeo = new THREE.BoxGeometry(0.15, 0.15, 0.6);
        const armMat = new THREE.MeshStandardMaterial({ color: 0xe0a98b, roughness: 0.6 });
        const arm = new THREE.Mesh(armGeo, armMat);
        arm.position.set(0.25, -0.25, -0.4);
        arm.rotation.y = -0.1;
        playerWeaponGroup.add(arm);

        const gunGeo = new THREE.BoxGeometry(0.1, 0.12, 0.5);
        const gunMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 });
        const gun = new THREE.Mesh(gunGeo, gunMat);
        gun.position.set(0.25, -0.15, -0.7);
        playerWeaponGroup.add(gun);

        const barrelGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.3);
        const barrelMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9 });
        const barrel = new THREE.Mesh(barrelGeo, barrelMat);
        barrel.rotation.x = Math.PI / 2;
        barrel.position.set(0.25, -0.13, -0.95);
        playerWeaponGroup.add(barrel);

        camera.add(playerWeaponGroup);
        scene.add(camera);

        camera.position.y = 1.6;

        // --- CONTRÔLES DE LA SOURIS (Pointer Lock API) ---
        gameOverlay.addEventListener('click', () => {
            if (isGameActive) {
                document.body.requestPointerLock();
            }
        });

        document.addEventListener('pointerlockchange', () => {
            if (!isGameActive) return;
            if (document.pointerLockElement === document.body) {
                gameOverlay.style.display = 'none';
            } else {
                gameOverlay.style.display = 'flex';
            }
        });

        let yaw = 0;
        let pitch = 0;
        const sensitivity = 0.002;

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement !== document.body || !isGameActive) return;

            yaw -= e.movementX * sensitivity;
            pitch -= e.movementY * sensitivity;
            pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));

            camera.rotation.order = "YXZ";
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;

            // Envoyer notre rotation à l'autre joueur en P2P si connecté
            if (p2pConnection && p2pConnection.open) {
                p2pConnection.send({
                    type: 'look',
                    yaw: yaw,
                    pitch: pitch
                });
            }
        });

        // --- ANIMATION DE TIR ---
        let isShooting = false;
        let shootTimer = 0;

        document.addEventListener('mousedown', (e) => {
            if (document.pointerLockElement !== document.body || !isGameActive) return;
            if (e.button === 0 && !isShooting) {
                isShooting = true;
                shootTimer = 0;
                
                // Notification P2P de l'action de tir
                if (p2pConnection && p2pConnection.open) {
                    p2pConnection.send({ type: 'shoot' });
                }
            }
        });

        // --- GESTION DE LA VIE ---
        let health = 100;
        function takeDamage(amount) {
            health -= amount;
            if (health < 0) health = 0;
            
            document.getElementById('health-bar').style.width = health + '%';
            document.getElementById('health-val').innerText = health;

            if (p2pConnection && p2pConnection.open) {
                p2pConnection.send({ type: 'health', value: health });
            }
        }

        // --- BOUCLE DE RENDU ET LOGIQUE ---
        function animate() {
            requestAnimationFrame(animate);

            if (isGameActive) {
                if (isShooting) {
                    shootTimer += 0.4;
                    if (shootTimer < Math.PI) {
                        playerWeaponGroup.position.z = Math.sin(shootTimer) * 0.1;
                        playerWeaponGroup.position.y = Math.sin(shootTimer) * 0.05;
                    } else {
                        playerWeaponGroup.position.set(0, 0, 0);
                        isShooting = false;
                    }
                } else {
                    const time = Date.now() * 0.002;
                    playerWeaponGroup.position.y = Math.sin(time) * 0.005;
                    playerWeaponGroup.position.x = Math.cos(time * 0.5) * 0.005;
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
