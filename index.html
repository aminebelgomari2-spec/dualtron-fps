<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon FPS HTML5 - Multi P2P Amélioré</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        /* Écran de connexion / Menu principal */
        #menu-container {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #111 0%, #222 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .menu-box {
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 12px;
            border: 2px solid #ff4b4b;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 75, 75, 0.3);
            max-width: 400px;
            width: 90%;
        }

        .menu-box h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #ff4b4b;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 0.9em;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            font-size: 1em;
            box-sizing: border-box;
        }

        .input-group input:focus {
            border-color: #ff4b4b;
            outline: none;
        }

        .menu-btn {
            width: 100%;
            padding: 12px;
            background: #ff4b4b;
            border: none;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .menu-btn:hover {
            background: #ff2a2a;
        }

        .p2p-info {
            margin-top: 15px;
            font-size: 0.85em;
            color: #888;
            border-top: 1px solid #333;
            padding-top: 15px;
        }

        /* Viseur au centre */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
            display: none;
        }

        /* Interface en jeu (HUD) */
        #hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 250px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #333;
            z-index: 5;
            display: none;
        }

        #player-profile {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 5px;
            border-left: 4px solid #ff4b4b;
            color: white;
            font-weight: bold;
            z-index: 5;
            display: none;
        }

        /* Zone d'affichage du Code de la Room Créée (En haut, au centre) */
        #room-code-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 25px;
            border-radius: 5px;
            border: 2px solid #2ecc71;
            color: #2ecc71;
            font-size: 1.2em;
            font-weight: bold;
            z-index: 5;
            display: none;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.3);
        }

        .bar-container {
            width: 100%;
            background-color: #444;
            height: 20px;
            border-radius: 5px;
            overflow: hidden;
        }

        #health-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff4b4b, #ff2a2a);
            transition: width 0.3s ease;
        }

        #health-text {
            color: white;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }

        /* Instructions d'activation de la souris */
        #game-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            z-index: 10;
            display: none;
        }

        /* Écran d'attente lors de la création d'une room */
        #waiting-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 90;
            display: none;
        }

        .code-box {
            font-size: 3em;
            color: #2ecc71;
            font-weight: bold;
            background: #222;
            padding: 10px 30px;
            border-radius: 8px;
            border: 2px dashed #2ecc71;
            margin: 20px 0;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="menu-container">
        <div class="menu-box">
            <h1>STRIKE P2P</h1>
            
            <div class="input-group">
                <label for="username-input">Choisis ton Pseudo :</label>
                <input type="text" id="username-input" placeholder="Soldat_Anonyme" maxlength="15">
            </div>

            <button class="menu-btn" id="btn-create-room" style="background: #2ecc71; margin-bottom: 10px;">Créer une Partie (Hôte)</button>

            <div class="p2p-info">
                <p>— OU REJOINDRE UNE PARTIE EXISTANTE —</p>
                <div class="input-group">
                    <label for="peer-id-input">Entrer le code à 4 chiffres de ton ami :</label>
                    <input type="text" id="peer-id-input" placeholder="Ex: 4829">
                </div>
                <button class="menu-btn" id="btn-Connect" style="background: #3498db;">Rejoindre l'ami</button>
            </div>
        </div>
    </div>

    <div id="waiting-screen">
        <h2>Partie créée avec succès !</h2>
        <p>Donne ce code à ton ami pour qu'il te rejoigne :</p>
        <div class="code-box" id="waiting-code-display">----</div>
        <p style="color: #aaa; font-style: italic;">En attente de connexion du deuxième joueur...</p>
    </div>

    <div id="game-overlay">
        <h2 style="font-size: 2em; margin-bottom: 10px;">Pause / Mode Fenêtré</h2>
        <p>Clique sur l'écran pour reprendre le contrôle</p>
    </div>

    <div id="crosshair"></div>

    <div id="room-code-display">ROOM CODE : <span id="top-room-code">----</span></div>

    <div id="player-profile">
        Joueur : <span id="display-username">...</span>
    </div>

    <div id="hud">
        <div id="health-text">VIE: <span id="health-val">100</span>%</div>
        <div class="bar-container">
            <div id="health-bar"></div>
        </div>
    </div>

    <script>
        // --- CONSTANTES & VARIABLES GLOBALES ---
        let playerPseudo = "Soldat";
        let isGameActive = false;
        let peer = null;
        let p2pConnection = null;
        let myPeerId = "";
        let isHost = false;

        // Structure pour le clavier (Ajout de 'space' pour le saut)
        const keysPressed = { 
            z: false, w: false, 
            s: false,           
            q: false, a: false, 
            d: false,
            pointer: false // géré via la souris
        };
        let spacePressed = false;

        // Paramètres cinétiques et physiques (Saut / Gravité)
        const moveSpeed = 0.12;
        let walkTime = 0; 
        let velocityY = 0; 
        const gravity = -0.012; 
        const jumpForce = 0.28; 
        let isGrounded = true; 
        const playerHeight = 1.6;

        // Tableau pour stocker les balles actives dans la scène 3D
        const bullets = [];
        const bulletSpeed = 0.8;

        // --- ENREGISTREMENT DES ENTRÉES DU MENU ---
        const btnCreateRoom = document.getElementById('btn-create-room');
        const btnConnect = document.getElementById('btn-Connect');
        const usernameInput = document.getElementById('username-input');
        const peerIdInput = document.getElementById('peer-id-input');
        const menuContainer = document.getElementById('menu-container');
        const waitingScreen = document.getElementById('waiting-screen');
        const gameOverlay = document.getElementById('game-overlay');

        // Générateur d'ID court
        function generateShortId() {
            return Math.floor(1000 + Math.random() * 9000).toString();
        }

        // --- LOGIQUE ACTION : CRÉER LA ROOM ---
        btnCreateRoom.addEventListener('click', () => {
            validerPseudo();
            isHost = true;
            myPeerId = generateShortId();
            
            // On initialise le réseau P2P avec ce code spécifique
            peer = new Peer(myPeerId);

            peer.on('open', (id) => {
                // On affiche le code sur l'écran d'attente
                document.getElementById('waiting-code-display').innerText = id;
                document.getElementById('top-room-code').innerText = id;
                menuContainer.style.display = 'none';
                waitingScreen.style.display = 'flex';
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    // Si pas de chance, on recrée un code
                    btnCreateRoom.click();
                }
            });

            // Quand le pote se connecte à notre code :
            peer.on('connection', (conn) => {
                p2pConnection = conn;
                setupConnectionEvents();
                waitingScreen.style.display = 'none';
                startGame();
            });
        });

        // --- LOGIQUE ACTION : REJOINDRE LA ROOM ---
        btnConnect.addEventListener('click', () => {
            validerPseudo();
            isHost = false;
            const targetId = peerIdInput.value.trim();
            if (targetId === "") {
                alert("Veuillez entrer le code à 4 chiffres de votre ami.");
                return;
            }

            // Un joueur qui rejoint se connecte avec un ID anonyme temporaire
            peer = new Peer();
            peer.on('open', () => {
                p2pConnection = peer.connect(targetId);
                document.getElementById('top-room-code').innerText = targetId;
                setupConnectionEvents();
                startGame();
            });
        });

        function validerPseudo() {
            if (usernameInput.value.trim() !== "") {
                playerPseudo = usernameInput.value.trim();
            }
            document.getElementById('display-username').innerText = playerPseudo;
        }

        function setupConnectionEvents() {
            p2pConnection.on('open', () => {
                p2pConnection.send({ type: 'init', pseudo: playerPseudo });
            });

            p2pConnection.on('data', (data) => {
                if (data.type === 'shoot_spawn') {
                    // On pourra générer visuellement la balle reçue du joueur distant ici
                    spawnVisualBullet(data.pos, data.dir);
                }
            });
        }

        function startGame() {
            menuContainer.style.opacity = '0';
            setTimeout(() => {
                menuContainer.style.display = 'none';
                document.getElementById('crosshair').style.display = 'block';
                document.getElementById('hud').style.display = 'block';
                document.getElementById('player-profile').style.display = 'block';
                document.getElementById('room-code-display').style.display = 'block'; // Affiche le code en haut en jeu !
                isGameActive = true;
                document.body.requestPointerLock();
            }, 500);
        }

        // --- CONFIGURATION DE BASE THREE.JS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.05);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- LUMIÈRES ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        scene.add(directionalLight);

        // --- LE SOL ---
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- CRÉATION DU BRAS ET DE L'ARME ---
        const playerWeaponGroup = new THREE.Group();

        const armGeo = new THREE.BoxGeometry(0.15, 0.15, 0.6);
        const armMat = new THREE.MeshStandardMaterial({ color: 0xe0a98b, roughness: 0.6 });
        const arm = new THREE.Mesh(armGeo, armMat);
        arm.position.set(0.25, -0.25, -0.4);
        arm.rotation.y = -0.1;
        playerWeaponGroup.add(arm);

        const gunGeo = new THREE.BoxGeometry(0.1, 0.12, 0.5);
        const gunMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 });
        const gun = new THREE.Mesh(gunGeo, gunMat);
        gun.position.set(0.25, -0.15, -0.7);
        playerWeaponGroup.add(gun);

        const barrelGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.3);
        const barrelMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9 });
        const barrel = new THREE.Mesh(barrelGeo, barrelMat);
        barrel.rotation.x = Math.PI / 2;
        barrel.position.set(0.25, -0.13, -0.95);
        playerWeaponGroup.add(barrel);

        camera.add(playerWeaponGroup);
        scene.add(camera);

        camera.position.set(0, playerHeight, 0);

        // --- ÉCOUTEURS CLAVIER (DÉPLACEMENTS & SAUT) ---
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key in keysPressed) keysPressed[key] = true;
            
            // Logique de saut avec Espace
            if (e.code === 'Space' || e.key === ' ') {
                if (isGrounded && isGameActive) {
                    velocityY = jumpForce;
                    isGrounded = false;
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key in keysPressed) keysPressed[key] = false;
        });

        // --- CONTRÔLES SOURIS ---
        gameOverlay.addEventListener('click', () => {
            if (isGameActive) document.body.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            if (!isGameActive) return;
            if (document.pointerLockElement === document.body) {
                gameOverlay.style.display = 'none';
            } else {
                gameOverlay.style.display = 'flex';
            }
        });

        let yaw = 0;
        let pitch = 0;
        const sensitivity = 0.002;

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement !== document.body || !isGameActive) return;

            yaw -= e.movementX * sensitivity;
            pitch -= e.movementY * sensitivity;
            pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));

            camera.rotation.order = "YXZ";
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
        });

        // --- SYSTÈME DE PROJECTILES (BALLES VISIBLES) ---
        function fireBullet() {
            // Déterminer la direction face à la caméra
            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);

            // Position de départ de la balle (au niveau de l'arme)
            const pos = new THREE.Vector3();
            barrel.getWorldPosition(pos);

            spawnVisualBullet(pos, direction);

            // Alerter le joueur distant via P2P du tir pour qu'il voit la balle aussi
            if (p2pConnection && p2pConnection.open) {
                p2pConnection.send({
                    type: 'shoot_spawn',
                    pos: { x: pos.x, y: pos.y, z: pos.z },
                    dir: { x: direction.x, y: direction.y, z: direction.z }
                });
            }
        }

        function spawnVisualBullet(startPos, dirVector) {
            // Création graphique d'une petite sphère lumineuse jaune/orange pour la balle
            const bulletGeo = new THREE.SphereGeometry(0.04, 8, 8);
            const bulletMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
            const bulletMesh = new THREE.Mesh(bulletGeo, bulletMat);
            
            bulletMesh.position.copy(startPos);
            scene.add(bulletMesh);

            // On stocke l'objet 3D et son vecteur direction pour l'animer dans la boucle principale
            bullets.push({
                mesh: bulletMesh,
                direction: new THREE.Vector3(dirVector.x, dirVector.y, dirVector.z),
                lifeTime: 0
            });
        }

        // --- ANIMATION DE TIR (CLIC) ---
        let isShooting = false;
        let shootTimer = 0;

        document.addEventListener('mousedown', (e) => {
            if (document.pointerLockElement !== document.body || !isGameActive) return;
            if (e.button === 0 && !isShooting) {
                isShooting = true;
                shootTimer = 0;
                fireBullet(); // Lance la balle physique et visible !
            }
        });

        // --- FONCTION DE LOGIQUE PHYSIQUE (MOUVEMENTS, GRAVITÉ, BALLES) ---
        function updatePhysics() {
            if (!isGameActive) return;

            // 1. GESTION DE LA GRAVITÉ ET DU SAUT (Seulement si capturé par l'écran)
            if (document.pointerLockElement === document.body) {
                velocityY += gravity;
                camera.position.y += velocityY;

                // Collision avec le sol (hauteur minimale de 1.6m)
                if (camera.position.y <= playerHeight) {
                    camera.position.y = playerHeight;
                    velocityY = 0;
                    isGrounded = true;
                }

                // 2. DÉPLACEMENTS LATÉRAUX / HORIZONTAUX
                const forwardVector = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                const sideVector = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                let moveDirection = new THREE.Vector3(0, 0, 0);

                if (keysPressed.z || keysPressed.w) moveDirection.add(forwardVector);
                if (keysPressed.s) moveDirection.add(forwardVector.clone().negate());
                if (keysPressed.q || keysPressed.a) moveDirection.add(sideVector.clone().negate());
                if (keysPressed.d) moveDirection.add(sideVector);

                if (moveDirection.lengthSq() > 0) {
                    moveDirection.normalize().multiplyScalar(moveSpeed);
                    camera.position.x += moveDirection.x;
                    camera.position.z += moveDirection.z;

                    // Balancement uniquement au sol
                    if (isGrounded) {
                        walkTime += 0.2;
                        camera.position.y = playerHeight + Math.sin(walkTime) * 0.03;
                        playerWeaponGroup.position.x = Math.cos(walkTime * 0.5) * 0.02;
                    }
                }
            }

            // 3. MISE À JOUR DES BALLES (Fait avancer les balles dans la scène)
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                // Fait avancer la balle le long de sa direction de tir
                b.mesh.position.addScaledVector(b.direction, bulletSpeed);
                b.lifeTime += 1;

                // On supprime la balle de la scène après 120 frames (environ 2 secondes de vol) pour éviter les lags
                if (b.lifeTime > 120) {
                    scene.remove(b.mesh);
                    bullets.splice(i, 1);
                }
            }

            // Émettre la position globale via P2P
            if (p2pConnection && p2pConnection.open) {
                p2pConnection.send({
                    type: 'move',
                    x: camera.position.x,
                    y: camera.position.y,
                    z: camera.position.z
                });
            }
        }

        // --- BOUCLE DE RENDU PRINCIPALE ---
        function animate() {
            requestAnimationFrame(animate);

            // Gestion de tous les mouvements et projectiles
            updatePhysics();

            if (isGameActive) {
                if (isShooting) {
                    shootTimer += 0.4;
                    if (shootTimer < Math.PI) {
                        playerWeaponGroup.position.z = Math.sin(shootTimer) * 0.1;
                        playerWeaponGroup.position.y = Math.sin(shootTimer) * 0.05;
                    } else {
                        playerWeaponGroup.position.set(0, 0, 0);
                        isShooting = false;
                    }
                } else if (!(keysPressed.z || keysPressed.w || keysPressed.s || keysPressed.q || keysPressed.a || keysPressed.d) && isGrounded) {
                    const time = Date.now() * 0.002;
                    playerWeaponGroup.position.y = Math.sin(time) * 0.005;
                    playerWeaponGroup.position.x = Math.cos(time * 0.5) * 0.005;
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
